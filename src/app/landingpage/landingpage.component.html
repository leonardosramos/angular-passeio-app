<div
    class="bg-gradient-to-r from-blue-500 to-blue-700 text-white min-h-screen flex flex-col justify-center items-center">

    <div class="text-center px-6 flex flex-col justify-center items-center">
        <h1 class="text-4xl font-bold mb-4">Bem vindo à sua lista de lugares favoritos!</h1>
        <p>Explore, organize e compartilhe seus lugares favoritos em um só lugar!</p>

        <button (click)="navegar()" *ngIf="isLoggedIn()"
            class="bg-white text-blue-700 font-semibold py-3 px-8 rounded-full hover:bg-gray-100 flex space-x-3  items-center mt-10">
            Olá, {{profile?.name}}. Clique aqui para aproveitar o site!</button>

        <button (click)="logarComGoogle()" *ngIf="!isLoggedIn()"
            class="bg-white text-blue-700 font-semibold px-5 py-4 rounded-full hover:bg-gray-100 flex space-x-3 items-center text-xl mt-10">
            <img  class="w-10 mr-2" src="https://user-images.githubusercontent.com/194400/70987158-4069c900-20b7-11ea-892e-8a2e1166b6b7.png" alt="">Entrar com o Google</button>
    </div>


</div>
